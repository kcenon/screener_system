backend:
  - changed-files:
    - any-glob-to-any-file: 'backend/**/*'

frontend:
  - changed-files:
    - any-glob-to-any-file: 'frontend/**/*'

database:
  - changed-files:
    - any-glob-to-any-file: 'database/**/*'
    - any-glob-to-any-file: 'backend/app/db/**/*'
    - any-glob-to-any-file: 'backend/alembic/**/*'

data-pipeline:
  - changed-files:
    - any-glob-to-any-file: 'data_pipeline/**/*'

infrastructure:
  - changed-files:
    - any-glob-to-any-file: 'docker-compose.yml'
    - any-glob-to-any-file: 'Dockerfile'
    - any-glob-to-any-file: '.github/**/*'
    - any-glob-to-any-file: 'infrastructure/**/*'

documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'
    - any-glob-to-any-file: 'docs/**/*'

tests:
  - changed-files:
    - any-glob-to-any-file: '**/*test*.py'
    - any-glob-to-any-file: '**/*test*.ts'
    - any-glob-to-any-file: '**/*test*.tsx'
    - any-glob-to-any-file: 'backend/tests/**/*'
    - any-glob-to-any-file: 'frontend/src/**/__tests__/**/*'
